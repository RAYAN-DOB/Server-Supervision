# Netlify Configuration for Next.js — AURION DSI Maisons-Alfort

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Configuration pour éviter les problèmes d'Edge Functions
[functions]
  node_bundler = "esbuild"

# ─── Headers de sécurité ───────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Clickjacking protection
    X-Frame-Options = "DENY"

    # MIME type sniffing prevention
    X-Content-Type-Options = "nosniff"

    # Referrer policy
    Referrer-Policy = "strict-origin-when-cross-origin"

    # HTTP Strict Transport Security (HSTS) — 1 an
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Permissions Policy — désactiver les APIs non utilisées
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), payment=()"

    # Content Security Policy
    # unsafe-inline nécessaire pour Tailwind CSS en production Next.js
    # unsafe-eval nécessaire pour certains bundlers Next.js 15
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://tile.openstreetmap.org https://*.tile.openstreetmap.org https://*.openstreetmap.org; connect-src 'self'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"

    # XSS protection (legacy)
    X-XSS-Protection = "1; mode=block"

# ─── Cache pour les assets statiques ──────────────────────────────────────────
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Pas de cache pour les API routes ─────────────────────────────────────────
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate"
    Pragma = "no-cache"
